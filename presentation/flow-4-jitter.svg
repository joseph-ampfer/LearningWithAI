<svg width="680" height="400" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">
<rect width="680" height="400" fill="#0f0f1a" rx="12"/>

<!-- Title -->
<text x="340" y="30" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="#e8e8f0">Projectile Position Over Time</text>
<text x="340" y="50" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#888">Simulated network jitter — same 100ms spikes</text>

<!-- Chart area background -->
<rect x="90" y="68" width="540" height="240" rx="6" fill="#0a0a14"/>

<!-- Grid lines vertical (time) -->
<line x1="225" y1="68" x2="225" y2="308" stroke="#1a1a2e" stroke-width="1"/>
<line x1="360" y1="68" x2="360" y2="308" stroke="#1a1a2e" stroke-width="1"/>
<line x1="495" y1="68" x2="495" y2="308" stroke="#1a1a2e" stroke-width="1"/>

<!-- Grid lines horizontal (position) -->
<line x1="90" y1="128" x2="630" y2="128" stroke="#1a1a2e" stroke-width="1"/>
<line x1="90" y1="188" x2="630" y2="188" stroke="#1a1a2e" stroke-width="1"/>
<line x1="90" y1="248" x2="630" y2="248" stroke="#1a1a2e" stroke-width="1"/>

<!-- Axes -->
<line x1="90" y1="308" x2="630" y2="308" stroke="#444" stroke-width="1.5"/>
<line x1="90" y1="68" x2="90" y2="308" stroke="#444" stroke-width="1.5"/>

<!-- X axis labels (time) -->
<text x="90" y="326" text-anchor="middle" font-family="monospace" font-size="11" fill="#555">0ms</text>
<text x="225" y="326" text-anchor="middle" font-family="monospace" font-size="11" fill="#555">250ms</text>
<text x="360" y="326" text-anchor="middle" font-family="monospace" font-size="11" fill="#555">500ms</text>
<text x="495" y="326" text-anchor="middle" font-family="monospace" font-size="11" fill="#555">750ms</text>
<text x="630" y="326" text-anchor="middle" font-family="monospace" font-size="11" fill="#555">1000ms</text>
<text x="360" y="348" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#666">time →</text>

<!-- Y axis labels (position) -->
<text x="84" y="312" text-anchor="end" font-family="monospace" font-size="11" fill="#555">0</text>
<text x="84" y="252" text-anchor="end" font-family="monospace" font-size="11" fill="#555">25</text>
<text x="84" y="192" text-anchor="end" font-family="monospace" font-size="11" fill="#555">50</text>
<text x="84" y="132" text-anchor="end" font-family="monospace" font-size="11" fill="#555">75</text>
<text x="84" y="72" text-anchor="end" font-family="monospace" font-size="11" fill="#555">100</text>
<text x="28" y="195" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#666" transform="rotate(-90 28 195)">position →</text>

<!-- 
Chart area: x=90..630 (540px), y=68..308 (240px)
Time: 0..1000ms → 0.54px/ms
Position: 0..100 → 2.4px/unit (inverted: pos=0 at y=308, pos=100 at y=68)

x(ms) = 90 + ms * 0.54
y(pos) = 308 - pos * 2.4

Key points for NetworkTransform (jagged):
ms=0,   pos=0:   x=90,  y=308
ms=80,  pos=8:   x=133, y=289  smooth
ms=80,  pos=8:   x=133, y=289
ms=200, pos=8:   x=198, y=289  FLAT (no update received)
ms=200, pos=20:  x=198, y=260  JUMP (batch of updates arrives)
ms=280, pos=28:  x=241, y=241  smooth
ms=280, pos=28:  x=241, y=241
ms=390, pos=28:  x=301, y=241  FLAT
ms=390, pos=39:  x=301, y=214  JUMP
ms=480, pos=48:  x=349, y=193  smooth
ms=480, pos=48:  x=349, y=193
ms=560, pos=48:  x=392, y=193  FLAT
ms=560, pos=56:  x=392, y=174  JUMP
ms=680, pos=68:  x=457, y=145  smooth
ms=680, pos=68:  x=457, y=145
ms=780, pos=68:  x=511, y=145  FLAT
ms=780, pos=78:  x=511, y=121  JUMP
ms=900, pos=90:  x=576, y=92   smooth
ms=1000,pos=100: x=630, y=68   end
-->

<!-- NetworkTransform path (red, jagged with flat sections and jumps) -->
<polyline points="90,308 133,289 198,289 198,260 241,241 301,241 301,214 349,193 392,193 392,174 457,145 511,145 511,121 576,92 630,68"
  fill="none" stroke="#f87171" stroke-width="2" stroke-linejoin="round"/>

<!-- Dots at jump points (highlighting the stutters) -->
<circle cx="198" cy="289" r="4" fill="#f87171" opacity="0.6"/>
<circle cx="198" cy="260" r="4" fill="#f87171"/>
<circle cx="301" cy="241" r="4" fill="#f87171" opacity="0.6"/>
<circle cx="301" cy="214" r="4" fill="#f87171"/>
<circle cx="392" cy="193" r="4" fill="#f87171" opacity="0.6"/>
<circle cx="392" cy="174" r="4" fill="#f87171"/>
<circle cx="511" cy="145" r="4" fill="#f87171" opacity="0.6"/>
<circle cx="511" cy="121" r="4" fill="#f87171"/>

<!-- Flat section callouts -->
<text x="165" y="284" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="9" fill="#f87171">pause</text>
<text x="271" y="236" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="9" fill="#f87171">pause</text>
<text x="371" y="188" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="9" fill="#f87171">pause</text>
<text x="481" y="140" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="9" fill="#f87171">pause</text>

<!-- 
Client simulation (smooth diagonal):
from (90,308) to (630,68) 
-->
<line x1="90" y1="308" x2="630" y2="68" stroke="#86efac" stroke-width="2.5"/>

<!-- Starting dots -->
<circle cx="90" cy="308" r="5" fill="#86efac"/>
<circle cx="90" cy="308" r="5" fill="#f87171"/>

<!-- Legend -->
<rect x="90" y="358" width="240" height="28" rx="5" fill="#1a0a0a"/>
<line x1="104" y1="372" x2="134" y2="372" stroke="#f87171" stroke-width="2"/>
<circle cx="119" cy="372" r="4" fill="#f87171"/>
<text x="142" y="377" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#f87171">NetworkTransform  (stutters)</text>

<rect x="350" y="358" width="240" height="28" rx="5" fill="#0a1a0a"/>
<line x1="364" y1="372" x2="394" y2="372" stroke="#86efac" stroke-width="2.5"/>
<text x="402" y="377" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#86efac">Client Simulation  (smooth)</text>
</svg>
