<svg width="680" height="490" viewBox="0 0 680 490" xmlns="http://www.w3.org/2000/svg">
<rect width="680" height="490" fill="#0f0f1a" rx="12"/>
<defs>
<marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
<path d="M1 1L9 5L1 9" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Title -->
<text x="340" y="30" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="#a78bfa">Naive Cast Flow</text>
<text x="340" y="50" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#f87171">Player waits ~300ms before seeing any feedback</text>

<!-- Actors -->
<rect x="130" y="64" width="180" height="36" rx="6" fill="#12122a" stroke="#7dd3fc" stroke-width="1.5"/>
<text x="220" y="87" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="600" fill="#7dd3fc">Client (local)</text>
<rect x="450" y="64" width="180" height="36" rx="6" fill="#12122a" stroke="#a78bfa" stroke-width="1.5"/>
<text x="540" y="87" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="600" fill="#a78bfa">Server</text>

<!-- Lifelines -->
<line x1="220" y1="100" x2="220" y2="460" stroke="#252550" stroke-width="1.5" stroke-dasharray="6 4"/>
<line x1="540" y1="100" x2="540" y2="460" stroke="#252550" stroke-width="1.5" stroke-dasharray="6 4"/>

<!-- Time labels -->
<text x="62" y="143" text-anchor="end" font-family="monospace" font-size="11" fill="#555">t=0.000</text>
<text x="62" y="243" text-anchor="end" font-family="monospace" font-size="11" fill="#555">t=0.150</text>
<text x="62" y="355" text-anchor="end" font-family="monospace" font-size="11" fill="#555">t=0.300</text>
<text x="62" y="447" text-anchor="end" font-family="monospace" font-size="11" fill="#555">t=0.700</text>

<!-- Horizontal guides -->
<line x1="66" y1="140" x2="650" y2="140" stroke="#1a1a2e" stroke-width="1"/>
<line x1="66" y1="240" x2="650" y2="240" stroke="#1a1a2e" stroke-width="1"/>
<line x1="66" y1="352" x2="650" y2="352" stroke="#1a1a2e" stroke-width="1"/>
<line x1="66" y1="444" x2="650" y2="444" stroke="#1a1a2e" stroke-width="1"/>

<!-- Event 1: Player presses F -->
<rect x="110" y="126" width="220" height="28" rx="5" fill="#0d1f30" stroke="#7dd3fc" stroke-width="1"/>
<text x="220" y="145" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#7dd3fc">Player presses F</text>

<!-- Arrow 1: Client to Server -->
<line x1="220" y1="155" x2="540" y2="233" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#a)"/>
<text x="382" y="186" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#fbbf24">TrySpellServerRPC  (+150ms)</text>

<!-- Event 2: Server validates -->
<rect x="428" y="233" width="224" height="28" rx="5" fill="#150e28" stroke="#a78bfa" stroke-width="1"/>
<text x="540" y="252" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#a78bfa">validates → PlayAnimClientRPC</text>

<!-- Arrow 2: Server to Client -->
<line x1="540" y1="262" x2="220" y2="340" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#a)"/>
<text x="382" y="294" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#fbbf24">PlayAnimClientRPC  (+150ms)</text>

<!-- Server active bar (waiting for cast delay) -->
<rect x="534" y="262" width="12" height="172" rx="3" fill="#a78bfa" opacity="0.2"/>

<!-- Event 3: Animation starts LATE (red) -->
<rect x="108" y="340" width="224" height="28" rx="5" fill="#2a0f0f" stroke="#f87171" stroke-width="2"/>
<text x="220" y="354" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" fill="#f87171">⚠  animation starts — 300ms late!</text>

<!-- Event 4: Projectile spawns -->
<rect x="428" y="434" width="224" height="28" rx="5" fill="#150e28" stroke="#a78bfa" stroke-width="1"/>
<text x="540" y="453" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#a78bfa">projectile spawns</text>

<!-- Brace showing the 300ms gap -->
<line x1="96" y1="140" x2="96" y2="368" stroke="#f87171" stroke-width="1.5"/>
<line x1="92" y1="140" x2="100" y2="140" stroke="#f87171" stroke-width="1.5"/>
<line x1="92" y1="368" x2="100" y2="368" stroke="#f87171" stroke-width="1.5"/>
<text x="90" y="260" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#f87171" transform="rotate(-90 90 260)">≈ 300ms delay</text>
</svg>
